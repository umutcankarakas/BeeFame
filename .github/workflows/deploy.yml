name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH deploy to server
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 25m
          script: |
            set -e
            cd /opt/BeeFame

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Rebuilding changed images ==="
            docker compose build

            echo "=== Restarting services ==="
            docker compose up -d

            echo "=== Waiting for services to start ==="
            sleep 20

            echo "=== Health check ==="
            curl -sf http://localhost:8000/status && echo "Backend OK" || echo "WARNING: Backend health check failed (may still be starting)"
            curl -sf -o /dev/null -w "Frontend HTTP: %{http_code}\n" http://localhost:3001/ || echo "WARNING: Frontend health check failed (may still be starting)"

            echo "=== Deploy complete ==="
