name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH deploy to server
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 25m
          script: |
            cd /opt/BeeFame

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Rebuilding changed images ==="
            docker compose build 2>&1 | tee /tmp/build.log
            BUILD_EXIT=${PIPESTATUS[0]}
            if [ $BUILD_EXIT -ne 0 ]; then
              echo "=== BUILD FAILED (exit $BUILD_EXIT) — last 50 lines ==="
              tail -50 /tmp/build.log
              exit $BUILD_EXIT
            fi

            echo "=== Restarting services ==="
            docker compose up -d

            echo "=== Waiting for services to start ==="
            sleep 20

            echo "=== Health check ==="
            curl -sf http://localhost:8000/status && echo "Backend OK" || echo "WARNING: Backend not ready yet"
            curl -sf -o /dev/null -w "Frontend HTTP: %{http_code}\n" http://localhost:3001/ || echo "WARNING: Frontend not ready yet"

            echo "=== Deploy complete ==="
