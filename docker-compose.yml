version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - beefame

  beespector:
    build:
      context: ./beespector
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    networks:
      - beefame

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - BACKEND_INTERNAL_URL=http://backend:8000
      - BEESPECTOR_INTERNAL_URL=http://beespector:8001
    depends_on:
      - backend
      - beespector
    networks:
      - beefame

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - beefame

networks:
  beefame:
    driver: bridge
